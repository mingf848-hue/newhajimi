<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈基米 - 智能知识库工具 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.4/otpauth.umd.min.js"></script>

    <style>
        body { background-color: #f1f5f9; color: #334155; font-family: -apple-system, system-ui, sans-serif; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid white; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .card-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFX_coAa6O_INyh_5uwkLtkfep2VehJxc",
            authDomain: "hajimi-assistant.firebaseapp.com",
            projectId: "hajimi-assistant",
            storageBucket: "hajimi-assistant.firebasestorage.app",
            messagingSenderId: "915974880846",
            appId: "1:915974880846:web:cf8b304605b1c892b68d1f",
            measurementId: "G-2H3YST6145"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        signInAnonymously(auth).catch(console.error);

        window.dbOps = {
            saveKnowledge: async (k) => {
                await addDoc(collection(db, "knowledge_base"), {
                    ...k,
                    importTime: new Date().toLocaleString(),
                    source: 'Smart Import Tool Pro'
                });
            },
            // 获取所有知识库内容
            getKnowledge: async () => {
                const q = query(collection(db, "knowledge_base"));
                const s = await getDocs(q);
                return s.docs.map(d => ({ id: d.id, ...d.data() }));
            },
            // 删除单条
            deleteKnowledge: async (id) => {
                await deleteDoc(doc(db, "knowledge_base", id));
            },
            verifyLogin: async (input) => { 
                try { 
                  if (!input) return { success: false }; 
                  const q = query(collection(db, "access_keys"), where("active", "==", true)); 
                  const snapshot = await getDocs(q); 
                  if (snapshot.empty) return { success: false }; 
                  let result = { success: false }; 
                  snapshot.forEach(doc => { 
                    if (result.success) return; 
                    const data = doc.data(); 
                    if (data.username && data.username === input) { result = { success: true }; } 
                    else if (data.secret && input.length === 6) { 
                        try { 
                            const totp = new OTPAuth.TOTP({ algorithm: 'SHA1', digits: 6, period: 30, secret: OTPAuth.Secret.fromBase32(data.secret) }); 
                            const delta = totp.validate({ token: input, window: 1 }); 
                            if (delta !== null) result = { success: true }; 
                        } catch(e) {} 
                    } 
                  }); 
                  return result; 
                } catch(e) { console.error(e); return { success: false }; } 
            }
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 容错 JSON 解析器 ---
        const tryParseJSON = (str) => {
            try {
                const clean = str.replace(/```json/g, '').replace(/```/g, '').trim();
                return JSON.parse(clean);
            } catch (e) {
                console.warn("JSON解析失败，尝试暴力提取数组...", e);
                try {
                    const startIdx = str.indexOf('[');
                    const endIdx = str.lastIndexOf(']');
                    if (startIdx !== -1 && endIdx !== -1) {
                        return JSON.parse(str.substring(startIdx, endIdx + 1));
                    }
                } catch (e2) {
                    console.error("修复失败:", e2);
                }
                return [];
            }
        };

        function LoginScreen({ onLogin }) {
            const [key, setKey] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async () => {
                if(!key.trim()) return;
                setLoading(true);
                const res = await window.dbOps.verifyLogin(key);
                if (res.success) { onLogin(); } 
                else { setError('密钥无效'); setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-200">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                        <div className="mb-4 text-4xl">📚</div>
                        <h2 className="text-xl font-bold text-slate-800 mb-6">哈基米知识库工具</h2>
                        <input 
                            type="password" 
                            className="w-full border p-3 rounded-lg outline-none focus:ring-2 ring-blue-500 mb-4 text-center font-mono" 
                            placeholder="输入访问密钥"
                            value={key}
                            onChange={e => setKey(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && handleLogin()}
                        />
                        {error && <div className="text-red-500 text-xs mb-3 font-bold">{error}</div>}
                        <button 
                            onClick={handleLogin} 
                            disabled={loading}
                            className="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-900 transition flex justify-center"
                        >
                            {loading ? <div className="spinner"></div> : '验证并进入'}
                        </button>
                    </div>
                </div>
            );
        }

        // --- 知识库管理组件 ---
        function KnowledgeManager() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedIds, setSelectedIds] = useState([]);
            const [isDeleting, setIsDeleting] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            const fetchData = async () => {
                setLoading(true);
                const res = await window.dbOps.getKnowledge();
                setData(res);
                setLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            const toggleSelect = (id) => {
                setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const toggleSelectAll = () => {
                if (selectedIds.length === filteredData.length) setSelectedIds([]);
                else setSelectedIds(filteredData.map(i => i.id));
            };

            const handleBatchDelete = async () => {
                if (selectedIds.length === 0) return;
                if (!confirm(`确定删除选中的 ${selectedIds.length} 条记录吗？此操作不可撤销。`)) return;
                
                setIsDeleting(true);
                for (const id of selectedIds) {
                    await window.dbOps.deleteKnowledge(id);
                }
                alert("删除完成");
                setSelectedIds([]);
                fetchData();
                setIsDeleting(false);
            };

            const filteredData = useMemo(() => {
                return data.filter(item => 
                    item.keywords?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    item.content?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.category?.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [data, searchTerm]);

            return (
                <div className="flex-1 flex flex-col overflow-hidden bg-white">
                    <div className="p-4 border-b flex justify-between items-center bg-slate-50">
                        <div className="flex items-center gap-4">
                            <input 
                                type="text" 
                                placeholder="搜索知识库..." 
                                className="border px-3 py-1.5 rounded-lg text-sm outline-none focus:ring-1 ring-blue-400 w-64"
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                            />
                            <button onClick={fetchData} className="text-blue-600 text-sm hover:underline">刷新</button>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-xs text-slate-500">已选 {selectedIds.length} 项</span>
                            <button 
                                onClick={handleBatchDelete}
                                disabled={selectedIds.length === 0 || isDeleting}
                                className="bg-red-500 hover:bg-red-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold disabled:opacity-30 transition"
                            >
                                {isDeleting ? '处理中...' : '批量删除'}
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto custom-scrollbar">
                        {loading ? (
                            <div className="h-full flex items-center justify-center text-slate-400">加载中...</div>
                        ) : filteredData.length === 0 ? (
                            <div className="h-full flex items-center justify-center text-slate-300 italic">暂无匹配数据</div>
                        ) : (
                            <table className="w-full text-left border-collapse">
                                <thead className="sticky top-0 bg-slate-100 z-10 shadow-sm">
                                    <tr>
                                        <th className="p-3 w-10 text-center">
                                            <input 
                                                type="checkbox" 
                                                checked={selectedIds.length > 0 && selectedIds.length === filteredData.length}
                                                onChange={toggleSelectAll}
                                            />
                                        </th>
                                        <th className="p-3 text-xs font-bold text-slate-500 uppercase w-32">分类</th>
                                        <th className="p-3 text-xs font-bold text-slate-500 uppercase w-48">关键词/标题</th>
                                        <th className="p-3 text-xs font-bold text-slate-500 uppercase">内容详情</th>
                                        <th className="p-3 text-xs font-bold text-slate-500 uppercase w-20 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.map((item) => (
                                        <tr key={item.id} className="border-b hover:bg-blue-50/30 transition-colors">
                                            <td className="p-3 text-center">
                                                <input 
                                                    type="checkbox" 
                                                    checked={selectedIds.includes(item.id)}
                                                    onChange={() => toggleSelect(item.id)}
                                                />
                                            </td>
                                            <td className="p-3"><span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">{item.category}</span></td>
                                            <td className="p-3 text-xs font-bold text-slate-700">{item.keywords}</td>
                                            <td className="p-3">
                                                <div className="text-[11px] text-slate-500 line-clamp-2 overflow-hidden whitespace-pre-wrap">{item.content}</div>
                                            </td>
                                            <td className="p-3 text-center">
                                                <button 
                                                    onClick={() => { if(confirm('删除此项？')) { window.dbOps.deleteKnowledge(item.id).then(fetchData); } }}
                                                    className="text-red-400 hover:text-red-600 text-xs"
                                                >删除</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                </div>
            );
        }

        // --- 导入功能组件 ---
        function ImporterApp({ onSwitchToManager }) {
            const [inputText, setInputText] = useState('');
            const [parsedData, setParsedData] = useState([]);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analyzeProgress, setAnalyzeProgress] = useState(null); 
            const [isSaving, setIsSaving] = useState(false);
            const [saveProgress, setSaveProgress] = useState(0);

            const handleAnalyze = async () => {
                if (!inputText.trim()) return alert("内容不能为空");
                setIsAnalyzing(true);
                setParsedData([]);

                const CHUNK_SIZE = 15000;
                const chunks = [];
                for (let i = 0; i < inputText.length; i += CHUNK_SIZE) {
                    chunks.push(inputText.slice(i, i + CHUNK_SIZE));
                }

                setAnalyzeProgress({ current: 0, total: chunks.length });
                let allResults = [];

                try {
                    for (let i = 0; i < chunks.length; i++) {
                        const chunk = chunks[i];
                        setAnalyzeProgress({ current: i + 1, total: chunks.length });

                        const prompt = `
                        你是一个资深的知识库数字化专家。你的任务是将下面的【规则文档】转换为高质量的 AI 知识条目。

                        【转换准则】：
                        1. **按主题聚合**：不要一行一行提取！将列表项或单句话按业务含义聚合为模块。
                        2. **逻辑单元**：每个条目必须包含一个完整的子主题详情（如：某种盘口的计算、某个活动的具体要求）。
                        3. **还原表格**：如果原文有数据对比或等级表，必须使用标准的 Markdown 表格格式还原。
                        4. **提取 Keywords**：Keywords 必须是用户可能询问的完整短句或核心主题。

                        【输出 JSON 结构】：
                        [
                          {
                            "category": "具体业务分类",
                            "keywords": "核心主题或常见提问",
                            "content": "包含完整逻辑内容，保留换行。",
                            "tags": ["标签1"]
                          }
                        ]

                        【待处理文本】：
                        ${chunk}

                        【强制】：只返回 JSON 数组，禁止任何解释，禁止 Markdown 代码块外框。
                        `;

                        const res = await fetch('/api/gemini', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                messages: { contents: [{ role: 'user', parts: [{ text: prompt }] }] },
                                mode: 'fast', 
                                temperature: 0.1 
                            })
                        });

                        const data = await res.json();
                        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        
                        if (rawText) {
                            const chunkData = tryParseJSON(rawText);
                            const list = Array.isArray(chunkData) ? chunkData : (chunkData.rules || chunkData.data || []);
                            allResults = [...allResults, ...list];
                        }
                    }
                    setParsedData(allResults);
                } catch (e) {
                    console.error(e);
                    alert("处理失败: " + e.message);
                }
                setIsAnalyzing(false);
                setAnalyzeProgress(null);
            };

            const handleSaveAll = async () => {
                if (parsedData.length === 0) return;
                if (!confirm(`准备将 ${parsedData.length} 条聚合知识存入数据库，是否继续？`)) return;
                
                setIsSaving(true);
                setSaveProgress(0);

                for (let i = 0; i < parsedData.length; i++) {
                    try {
                        await window.dbOps.saveKnowledge(parsedData[i]);
                        setSaveProgress(i + 1);
                        await new Promise(r => setTimeout(r, 50)); 
                    } catch (e) { console.error(e); }
                }

                alert("✅ 导入成功！");
                setIsSaving(false);
                setParsedData([]);
                setInputText('');
            };

            const updateItem = (index, field, val) => {
                const newData = [...parsedData];
                newData[index][field] = val;
                setParsedData(newData);
            };

            return (
                <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                    {/* 左边栏 */}
                    <div className="w-full md:w-1/3 bg-white border-r flex flex-col shadow-inner h-1/2 md:h-auto">
                        <div className="flex-1 p-4 flex flex-col gap-4">
                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">原始文案粘贴</label>
                            <textarea 
                                className="flex-1 p-4 text-sm bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-400 focus:bg-white transition-all resize-none font-mono"
                                placeholder="在这里粘贴超长文档..."
                                value={inputText}
                                onChange={e => setInputText(e.target.value)}
                            />
                            <button 
                                onClick={handleAnalyze}
                                disabled={isAnalyzing || !inputText.trim()}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition disabled:opacity-50 flex items-center justify-center gap-3"
                            >
                                {isAnalyzing ? <div className="spinner"></div> : '⚡'}
                                {isAnalyzing ? `解析中 ${analyzeProgress ? `(${analyzeProgress.current}/${analyzeProgress.total})` : ''}` : '智能转换 (JSON)'}
                            </button>
                        </div>
                    </div>

                    {/* 右边栏 */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b flex justify-between items-center shadow-sm">
                            <h2 className="font-black text-slate-700">解析结果预览 ({parsedData.length})</h2>
                            <button 
                                onClick={handleSaveAll}
                                disabled={isSaving || parsedData.length === 0}
                                className="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-8 py-2 rounded-lg shadow-lg disabled:opacity-30 transition"
                            >
                                {isSaving ? `写入中 ${saveProgress}/${parsedData.length}` : '保存到数据库'}
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                            {parsedData.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-slate-300 italic">
                                    <p>等待解析数据...</p>
                                </div>
                            ) : (
                                parsedData.map((item, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm card-enter group relative">
                                        <button onClick={() => { const d = [...parsedData]; d.splice(idx, 1); setParsedData(d); }} className="absolute top-4 right-4 text-slate-200 hover:text-red-500">✕</button>
                                        <div className="flex gap-4 mb-4">
                                            <div className="w-1/3">
                                                <label className="text-[10px] font-black text-slate-300 uppercase block mb-1">分类</label>
                                                <input value={item.category} onChange={e => updateItem(idx, 'category', e.target.value)} className="w-full text-xs font-bold text-blue-600 bg-blue-50 border-none rounded-lg px-3 py-2 outline-none focus:ring-1 ring-blue-300" />
                                            </div>
                                            <div className="flex-1">
                                                <label className="text-[10px] font-black text-slate-300 uppercase block mb-1">标题/关键词</label>
                                                <input value={item.keywords} onChange={e => updateItem(idx, 'keywords', e.target.value)} className="w-full text-xs font-bold text-slate-700 bg-slate-50 border-none rounded-lg px-3 py-2 outline-none focus:ring-1 ring-blue-300" />
                                            </div>
                                        </div>
                                        <textarea value={item.content} onChange={e => updateItem(idx, 'content', e.target.value)} className="w-full text-xs text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-100 min-h-[120px] font-mono leading-relaxed outline-none focus:bg-white focus:border-blue-200 transition-all" />
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // --- 根组件 ---
        function Root() {
            const [authed, setAuthed] = useState(false);
            const [activeMode, setActiveMode] = useState('importer'); // 'importer' or 'manager'

            if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* 顶部导航 */}
                    <div className="bg-slate-800 text-white px-6 flex justify-between items-center shadow-lg z-20 shrink-0">
                        <div className="flex items-center gap-8 h-16">
                            <h1 className="font-bold text-lg flex items-center gap-2">
                                <span className="bg-blue-600 p-1 rounded">📚</span> 知识库管理中心
                            </h1>
                            <nav className="flex h-full gap-2">
                                <button 
                                    onClick={() => setActiveMode('importer')}
                                    className={`px-4 h-full text-sm font-bold flex items-center transition-all ${activeMode === 'importer' ? 'bg-slate-700 border-b-4 border-blue-500' : 'hover:bg-slate-700 text-slate-400'}`}
                                >
                                    数据转换导入
                                </button>
                                <button 
                                    onClick={() => setActiveMode('manager')}
                                    className={`px-4 h-full text-sm font-bold flex items-center transition-all ${activeMode === 'manager' ? 'bg-slate-700 border-b-4 border-blue-500' : 'hover:bg-slate-700 text-slate-400'}`}
                                >
                                    管理现有库
                                </button>
                            </nav>
                        </div>
                        <div className="text-[10px] opacity-40 font-mono hidden md:block">v4.0.0 SMART CLOUD SYNC</div>
                    </div>

                    {/* 功能区域渲染 */}
                    {activeMode === 'importer' ? <ImporterApp /> : <KnowledgeManager />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
