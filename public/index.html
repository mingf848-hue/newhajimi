  <script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCFX_coAa6O_INyh_5uwkLtkfep2VehJxc",
      authDomain: "hajimi-assistant.firebaseapp.com",
      projectId: "hajimi-assistant",
      storageBucket: "hajimi-assistant.firebasestorage.app",
      messagingSenderId: "915974880846",
      appId: "1:915974880846:web:cf8b304605b1c892b68d1f",
      measurementId: "G-2H3YST6145"
    };

    window.safeStringify = (obj, indent = 2) => {
        const cache = new Set();
        return JSON.stringify(obj, (key, value) => {
            if (typeof value === 'object' && value !== null) {
                if (cache.has(value)) return '[Circular]';
                cache.add(value);
            }
            return value;
        }, indent);
    };

    try {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        signInAnonymously(auth).catch(() => {});
        window.storage = getStorage(app);

        window.fbOps = {
            apiCall: async (method, path, body = null) => {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000); 
                try {
                    const opts = { method, headers: { 'Content-Type': 'application/json' }, signal: controller.signal };
                    if (body) opts.body = JSON.stringify(body);
                    const res = await fetch(path, opts);
                    if (!res.ok) throw new Error(await res.text());
                    return await res.json();
                } finally {
                    clearTimeout(timeoutId);
                }
            },
            
            getScripts: async () => {
                const user = localStorage.getItem('hajimi_username') || 'Unknown';
                return window.fbOps.apiCall('GET', `/api/db/scripts?user=${encodeURIComponent(user)}`);
            },
            saveScript: async (s) => { 
                const user = localStorage.getItem('hajimi_username') || 'Unknown';
                const payload = { category: s.category, keywords: s.keywords, content: s.content, time: new Date().toLocaleString(), id: s.id, user };
                await window.fbOps.apiCall('POST', '/api/db/scripts', payload);
                return await window.fbOps.getScripts();
            },
            deleteScript: async (id) => { await window.fbOps.apiCall('DELETE', `/api/db/scripts/${id}`); return await window.fbOps.getScripts(); },
            
            getKnowledge: async () => window.fbOps.apiCall('GET', '/api/db/knowledge_base'),
            saveKnowledge: async (k) => window.fbOps.apiCall('POST', '/api/db/knowledge_base', k),
            
            getImages: async () => window.fbOps.apiCall('GET', '/api/db/images'),
            uploadImage: async (file, title, tags) => { 
                const storageRef = ref(window.storage, 'images/' + Date.now() + '_' + file.name); 
                await uploadBytes(storageRef, file); 
                const url = await getDownloadURL(storageRef); 
                await window.fbOps.apiCall('POST', '/api/db/images', { title, tags, url, storagePath: storageRef.fullPath, time: new Date().toISOString() }); 
                return await window.fbOps.getImages(); 
            },
            deleteImage: async (id, storagePath) => { 
                await window.fbOps.apiCall('DELETE', `/api/db/images/${id}`); 
                if(storagePath) { try { await deleteObject(ref(window.storage, storagePath)); } catch(e) {} } 
                return await window.fbOps.getImages(); 
            },

            getTemplates: async () => window.fbOps.apiCall('GET', '/api/db/templates'),
            getCustomVars: async () => { try { const d = await window.fbOps.apiCall('GET', '/api/db/global_settings/template_vars'); return d ? (d.vars || []) : []; } catch(e) { return []; } },
            addCustomVar: async (v) => { try { const d = await window.fbOps.apiCall('GET', '/api/db/global_settings/template_vars'); let vars = d ? (d.vars || []) : []; if(!vars.includes(v)) { vars.push(v); await window.fbOps.apiCall('POST', '/api/db/global_settings', { id: 'template_vars', vars }); } return vars; } catch(e) { return []; } },
            deleteCustomVar: async (v) => { try { const d = await window.fbOps.apiCall('GET', '/api/db/global_settings/template_vars'); let vars = d ? (d.vars || []) : []; if(vars.includes(v)) { vars = vars.filter(item => item !== v); await window.fbOps.apiCall('POST', '/api/db/global_settings', { id: 'template_vars', vars }); } return vars; } catch(e) { return []; } },

            getTrackedTickets: async (username) => window.fbOps.apiCall('GET', `/api/db/monitoring?user=${username}`),
            saveTrackedTicket: async (ticket) => window.fbOps.apiCall('POST', '/api/db/monitoring', { ...ticket, id: ticket.orderId }),
            deleteTrackedTicket: async (orderId) => window.fbOps.apiCall('DELETE', `/api/db/monitoring/${orderId}`),

            getRecentBadAnnouncements: async () => window.fbOps.apiCall('GET', '/api/db/announcement_logs?limit=20'),
            saveTemplate: async (t) => { 
                const content = t.front + t.mail + t.inner; 
                const matches = content.match(/\{{1,2}([\w\u4e00-\u9fa5]+)\}{1,2}/g); 
                const vars = matches ? [...new Set(matches.map(s => s.replace(/[{}]/g, '')))] : []; 
                const data = { id: t.id, type: t.type || "未命名维护", front: t.front || "", inner: t.inner || "", mail: t.mail || "", requiredVars: vars, time: new Date().toISOString() }; 
                await window.fbOps.apiCall('POST', '/api/db/templates', data); 
                return await window.fbOps.getTemplates(); 
            },
            deleteTemplate: async (id) => { await window.fbOps.apiCall('DELETE', `/api/db/templates/${id}`); return await window.fbOps.getTemplates(); },
            
            getAllDataForBackup: async () => { 
                const scripts = await window.fbOps.getScripts(); 
                const templates = await window.fbOps.getTemplates(); 
                const images = await window.fbOps.getImages(); 
                return { exportTime: new Date().toISOString(), scripts, templates, images }; 
            },

            saveFeedback: async (d) => { 
                let safeId = (d.question || "unknown").replace(/[#\/\.\$\[\]\n\r]/g, "_").substring(0, 50); 
                let docId = `${safeId}_${Date.now()}`; 
                const user = localStorage.getItem('hajimi_username') || 'Unknown'; 
                await window.fbOps.apiCall('POST', '/api/db/training_data', { ...d, id: docId, user, time: new Date().toLocaleString() }); 
            },
            saveAnnFeedback: async (d) => { 
                const user = localStorage.getItem('hajimi_username') || 'Unknown'; 
                let dataToSave = { raw: d.raw, type: d.type, reason: d.reason, user, time: new Date().toLocaleString() }; 
                if (d.type === 'bad') { dataToSave.wrong_front = d.front || ""; dataToSave.wrong_inner = d.inner || ""; dataToSave.wrong_mail = d.mail || ""; dataToSave.front = ""; dataToSave.inner = ""; dataToSave.mail = ""; } 
                else { dataToSave.front = d.front || ""; dataToSave.inner = d.inner || ""; dataToSave.mail = d.mail || ""; } 
                let safeId = (d.raw || "unknown").replace(/[#\/\.\$\[\]\n\r]/g, "_").substring(0, 50); 
                let docId = `${safeId}_${Date.now()}`; 
                await window.fbOps.apiCall('POST', '/api/db/announcement_logs', { ...dataToSave, id: docId }); 
            },
            
            getAnnLogsAll: async () => window.fbOps.apiCall('GET', '/api/db/announcement_logs?limit=5000'),
            getTrainingDataAll: async () => window.fbOps.apiCall('GET', '/api/db/training_data?limit=5000'),
            deleteTrainingData: async (id) => { await window.fbOps.apiCall('DELETE', `/api/db/training_data/${id}`); return await window.fbOps.getTrainingDataAll(); },
            deleteAnnLog: async (id) => { await window.fbOps.apiCall('DELETE', `/api/db/announcement_logs/${id}`); return await window.fbOps.getAnnLogsAll(); },
            
            getCloudPrompts: async () => { try { const d = await window.fbOps.apiCall('GET', '/api/db/global_settings/ai_prompts'); return d || {}; } catch(e) { return {}; } },
            saveCloudPrompts: async (data) => window.fbOps.apiCall('POST', '/api/db/global_settings', { id: 'ai_prompts', ...data }),

            // --- 账号管理 API ---
            getAccounts: async () => window.fbOps.apiCall('GET', '/api/db/access_keys'),
            saveAccount: async (acc) => window.fbOps.apiCall('POST', '/api/db/access_keys', acc),
            deleteAccount: async (id) => window.fbOps.apiCall('DELETE', `/api/db/access_keys/${id}`),
            
            verifyLogin: async (input) => { 
                try { 
                    if (!input) return { success: false }; 
                    const keys = await window.fbOps.apiCall('GET', '/api/db/access_keys?active=true'); 
                    if (!keys || keys.length === 0) return { success: false }; 
                    let result = { success: false }; 
                    keys.forEach(data => { 
                        if (result.success) return; 
                        if (data.username && data.username === input) { result = { success: true, username: data.username, role: data.role || 'user' }; } 
                        else if (data.secret && input.length === 6 && /^\d+$/.test(input)) { 
                            try {

                                const delta = totp.validate({ token: input, window: 1 }); 
                                if (delta !== null) { result = { success: true, username: data.username || data.note || "OTP用户", role: data.role || 'admin' }; } 
                            } catch(e) {} 
                        } 
                    }); 
                    return result; 
                } catch(e) { console.error("Auth Error:", e); return { success: false }; } 
            }

        let systemInstruction = undefined;
        const contents = [];
        messages.forEach(msg => {
            if (msg.role === 'system') {
                if (!systemInstruction) systemInstruction = { parts: [] };
                systemInstruction.parts.push({ text: msg.content });
            } else {
                let parts = [];
                if (Array.isArray(msg.content)) {
                    parts = msg.content;
                } else {
                    parts = [{ text: msg.content }];
                }
                contents.push({
                    role: msg.role === 'assistant' ? 'model' : 'user',
                    parts: parts
                });
            }
        });
        return { systemInstruction, contents };
    };

    const callGeminiStream = async (messages, temp = 0.4, onChunk, mode = MODE_FAST) => {
        try {
            const { systemInstruction, contents } = convertOpenAIToGemini(messages);
            const response = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    messages: { systemInstruction, contents },
                    mode: mode,
                    temperature: temp,
                    stream: true
                })
            });

            if (!response.ok) { 
                const errText = await response.text();
                return { error: `Server Error: ${response.status} - ${errText}` }; 
            }

            const reader = response.body.getReader(); 
            const decoder = new TextDecoder(); 
            let fullText = '';
            let buffer = '';
            let finalUsage = null;
            
            while (true) {
                const { done, value } = await reader.read(); 
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); 

                for (const line of lines) {
                    const trimmedLine = line.trim();
                    if (!trimmedLine) continue;

                    let json = null;
                    if (trimmedLine.startsWith('data:')) {
                        try {
                            const jsonStr = trimmedLine.substring(5).trim();
                            if (jsonStr) json = JSON.parse(jsonStr);
                        } catch (e) {}
                    } else if (trimmedLine.startsWith('{') || trimmedLine.startsWith('[')) {
                        try {
                            const cleanJson = trimmedLine.startsWith(',') ? trimmedLine.substring(1) : trimmedLine;
                            json = JSON.parse(cleanJson);
                        } catch (e) {}
                    }

                    if (json) {
                        const items = Array.isArray(json) ? json : [json];
                        for(const item of items) {
                            const text = item.candidates?.[0]?.content?.parts?.[0]?.text;
                            if (text) {
                                fullText += text; 
                                if (onChunk) onChunk(text, fullText);
                            }
                            if (item.usageMetadata) {
                                finalUsage = item.usageMetadata;
                            }
                        }
                    }
                }
            }
            return { success: true, data: fullText, usage: finalUsage };
        } catch (e) { return { error: "连接异常: " + e.message }; }

    function HighlightedTextarea({ value, onChange, placeholder, className, onFocus, inputRef }) {
        const backdropRef = useRef(null);
        
        const handleScroll = (e) => {
            if (backdropRef.current) {
                backdropRef.current.scrollTop = e.target.scrollTop;
                backdropRef.current.scrollLeft = e.target.scrollLeft;
            }
        };

        const getHighlightedText = (text) => {
            if (!text) return '';
            let escaped = text.replace(/&/g, "&").replace(/</g, "<").replace(/>/g, ">");
            return escaped.replace(/(\{\{.*?\}\})/g, '<span class="text-blue-600 font-bold bg-blue-50 rounded-sm">$1</span>');
        };

        const displayText = getHighlightedText(value) + (value.endsWith('\n') ? '<br> ' : '');

        return (
            <div className={`relative group ${className} !bg-white !text-transparent`}> 
               <div ref={backdropRef} className="absolute inset-0 p-2 text-sm font-mono whitespace-pre-wrap break-words overflow-hidden text-slate-800 pointer-events-none" style={{ borderColor: 'transparent', lineHeight: '1.5' }} dangerouslySetInnerHTML={{ __html: displayText }} />
               <textarea ref={inputRef} value={value} onChange={onChange} onScroll={handleScroll} onFocus={onFocus} placeholder={placeholder} className="absolute inset-0 w-full h-full p-2 text-sm font-mono bg-transparent outline-none resize-none border-none text-transparent caret-slate-800 focus:ring-0" style={{ color: 'transparent', caretColor: '#334155', lineHeight: '1.5', fontFamily: 'Menlo, Monaco, Courier New, monospace' }} />
            </div>
        );
    }

    function BetQuery() {
        const [orderId, setOrderId] = useState('5294113078041976');
        const [queryStatus, setQueryStatus] = useState('idle'); 
        const [statusMsg, setStatusMsg] = useState('');
        const [ticketData, setTicketData] = useState(null);
        const [ticketListRaw, setTicketListRaw] = useState(null);
        const [debugMode, setDebugMode] = useState(false);

        const formatDate = (date) => {
            const pad = (n) => String(n).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
        };

        const safeFmt = (num) => {
            if (num === null || num === undefined || isNaN(num)) return "0";
            return Number(num).toLocaleString();
        };

        const handleQuery = async () => {
            if (!orderId) return setStatusMsg('请输入注单号');
            setQueryStatus('loading'); setStatusMsg('正在连接系统...'); setTicketData(null);
            
            try {
                const token = await DBS_API.getToken();
                if (!token) { setQueryStatus('error'); setStatusMsg('❌ 系统连接失败'); return; }

                const now = new Date();
                const payload = { "filter": "1", "orderNo": orderId, "databaseSwitch": 1, "userIdList": [], "startTime": formatDate(new Date(now.getTime() - 90 * 86400000)), "endTime": formatDate(now), "pageNum": 1, "pageSize": 10 };

                const res = await fetch(`https://api.dbsportxxxwo8.com/yewu17/admin/userReport/queryTicketList?rnd=${Date.now()}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": token, "user-id": "1261540827428163584" },
                    body: JSON.stringify(payload)
                });
                
                if (res.status === 401) { localStorage.removeItem('dbs_token_cache'); setQueryStatus('error'); setStatusMsg('⚠️ 密钥过期，请重试'); return; }

                if (res.ok) {
                    const json = await res.json();
                    setTicketListRaw(json);
                    
                    if (json.data?.list?.length > 0) {
                        const item = json.data.list[0];
                        let ticketStatus = 'pending';
                        let statusText = '未结算';
                        const outcome = item.outcome;
                        
                        if (outcome === 4 || outcome === 5) { ticketStatus = 'win'; statusText = '赢 (WIN)'; }
                        else if (outcome === 3 || outcome === 6) { ticketStatus = 'loss'; statusText = '输 (LOSS)'; }
                        else if (outcome === 2) { ticketStatus = 'draw'; statusText = '走水'; }
                        else if (item.remark && item.remark.includes('取消')) { ticketStatus = 'cancelled'; statusText = '注单取消'; }
                        else if (item.remark && (item.remark.includes('拒单') || item.remark.includes('失败'))) { ticketStatus = 'cancelled'; statusText = '投注失败'; }
                        else { ticketStatus = 'pending'; statusText = '未结算'; } 
                        
                        const profit = item.localProfitAmount || 0;
                        const profitStr = profit > 0 ? "+" + safeFmt(profit) : safeFmt(profit);

                        let displayRemark = item.remark || '';
                        if (['赛事秒接', '用户下注'].includes(displayRemark)) displayRemark = '';

                        setTicketData({ 
                            raw: item, 
                            details: item.orderDetailList || [], 
                            status: ticketStatus,
                            statusText: statusText, 
                            profitStr: profitStr, 
                            seriesText: item.seriesValue || "单关", 
                            betCount: item.betCount || 1,
                            displayRemark: displayRemark
                        });
                        setQueryStatus('success'); setStatusMsg('');
                    } else { setQueryStatus('empty'); setStatusMsg('❌ 未查询到该注单数据'); }
                } else { setQueryStatus('error'); setStatusMsg(`HTTP Error: ${res.status}`); }
            } catch (e) { setQueryStatus('error'); setStatusMsg(`网络错误: ${e.message}`); }

            if (res === 6) return <span className="leg-result leg-loss">输半</span>;

            return <span className="leg-result bg-slate-100 text-slate-500">{remark || '未结算'}</span>;
        };

        return (

                        </div>
                        <div className="flex gap-2">
                            <input value={orderId} onChange={e=>setOrderId(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleQuery()} className="main-input" placeholder="输入注单号 (Enter查询)" />
                            <button onClick={handleQuery} disabled={queryStatus === 'loading'} className="bg-blue-600 text-white px-5 rounded-lg font-bold text-sm hover:bg-blue-700 disabled:opacity-50 transition whitespace-nowrap shadow-sm">
                                {queryStatus === 'loading' ? <div className="spinner border-white/20 border-t-white w-4 h-4"></div> : '查询'}
                            </button>

                        {statusMsg && <div className={`text-center text-xs p-2 rounded ${queryStatus==='error'?'text-red-500 bg-red-50':'text-slate-500 bg-slate-50'}`}>{statusMsg}</div>}
                    </div>

                    {ticketData && (

                            <div className="ticket-status-bar">
                                <div>
                                    <span>{ticketData.statusText}</span>
                                    {ticketData.displayRemark && <span className="ml-2 text-xs bg-black/20 px-2 py-0.5 rounded">{ticketData.displayRemark}</span>}

      const addToTracker = async (ticketDetails, rawItem) => {
          if (!ticketDetails || ticketDetails.length === 0) return;
          const mainDetail = ticketDetails[0]; 
          const isPending = rawItem.outcome === null || rawItem.outcome === 0 || rawItem.outcome === 1;
          const isSettled = !isPending;
          
          let resultStr = "未结算";
          let status = 'pending';

          if (isSettled) {
             if (rawItem.outcome === 4 || rawItem.outcome === 5) { resultStr = "赢 " + rawItem.localProfitAmount; status = 'win'; }
             else if (rawItem.outcome === 3 || rawItem.outcome === 6) { resultStr = "输 " + rawItem.localProfitAmount; status = 'loss'; }
             else if (rawItem.outcome === 2) { resultStr = "走水"; status = 'draw'; }
             else if (rawItem.remark && rawItem.remark.includes('取消')) { resultStr = "注单取消"; status = 'cancelled'; }
             else if (rawItem.remark && (rawItem.remark.includes('拒单') || rawItem.remark.includes('失败'))) { resultStr = "投注失败"; status = 'cancelled'; }
          }

          const ticketObj = {
              orderId: rawItem.orderNo,
              status: status,
              resultStr: resultStr,
              matchInfo: `${mainDetail.sportName} | ${mainDetail.matchInfo}`,
              user: currentUser || 'Unknown',
              addTime: new Date().toLocaleString(),
              updateTime: new Date().toLocaleString()
          };
          await window.fbOps.saveTrackedTicket(ticketObj);
          setTrackedTickets(prev => {

          if (pendings.length === 0) { setIsTrackerRefreshing(false); return; }
          let changesCount = 0;
          const newTickets = [...currentList];
          for (const t of pendings) {
              const res = await DBS_API.queryTicket(t.orderId);
              if (res.success && res.rawDetails) {
                  const rawItem = res.rawItem; 
                  const isPending = rawItem.outcome === null || rawItem.outcome === 0 || rawItem.outcome === 1;
                  if (!isPending) {
                      changesCount++;
                      let resultStr = "未结算";
                      let status = 'pending';
                      if (rawItem.outcome === 4 || rawItem.outcome === 5) { resultStr = "赢 " + rawItem.localProfitAmount; status = 'win'; }
                      else if (rawItem.outcome === 3 || rawItem.outcome === 6) { resultStr = "输 " + rawItem.localProfitAmount; status = 'loss'; }
                      else if (rawItem.outcome === 2) { resultStr = "走水"; status = 'draw'; }

                             <div>
                                <div className="prompt-label"><span>智能知识库 (Learned Rules - Dynamic)</span> <button onClick={handleTrainChat} disabled={isChatTrainingLoading} className="text-blue-600 text-[10px] hover:underline flex items-center gap-1">{isChatTrainingLoading ? 'AI思考中...' : '🔄 提取训练'}</button></div>
                                <textarea className={`prompt-editor ${isChatTrainingLoading ? 'loading' : ''}`} style={{minHeight: '120px'}} value={chatKnowledge} onChange={e => setChatKnowledge(e.target.value)} placeholder="点击上方“提取训练”按钮，AI将自动从纠错记录中总结规则..." readOnly={isChatTrainingLoading}></textarea>
                             </div>
                             
                             <div className="flex-1 flex flex-col mt-3 pt-3 border-t border-slate-100">
                                <div className="prompt-label text-red-600">
                                    <span>⚖️ 业务硬性逻辑 (Business Hard Rules)</span> 
                                    <span className="text-[10px] font-normal ml-2 text-slate-400">含公告模板、计算公式、风控底线</span>
                                </div>
                                <textarea 
                                    className="prompt-editor flex-1 border-red-200 focus:border-red-400 bg-red-50/10" 
                                    style={{minHeight: '250px'}}
                                    value={businessRules} 
                                    onChange={e => setBusinessRules(e.target.value)} 
                                    placeholder="在此定义绝对不可违背的业务规则、话术模板..."
                                ></textarea>
                             </div>
                        </div>
                        <div className="p-3 border-t"><button onClick={() => handleSaveCloudPrompts('chat')} disabled={isChatTrainingLoading} className="w-full bg-blue-600 text-white py-2 rounded font-bold text-xs hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center gap-2"><Icon d={PATHS.Save} className="w-4 h-4"/> 保存客服设定到云端</button></div>
                    </div>
                </div>
              </div>
            )}
           </main>
           <StatusBar usage={lastUsage} />
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
