<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>哈基米助手 (Pro Max - Multi-Agent Full)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="https://lh3.googleusercontent.com/d/1Rri7vVK9YyhQEdqzvgmjQ4kzNZdbQuxV" type="image/png">
  
  <!-- 引入拆分后的外置 CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.4/otpauth.umd.min.js"></script>
  
  <script>
    tailwind.config = { theme: { extend: { screens: { 'xs': '375px' } } } };
    window.onerror = function(msg, url, line, col, error) {
      const errorDiv = document.getElementById('global-error');
      if (errorDiv) {
        errorDiv.style.display = 'flex';
        document.getElementById('error-msg').innerText = "页面崩溃: " + msg + "\n" + (error ? error.stack : "");
      }
    };
    window.onunhandledrejection = function(event) {
      const errorDiv = document.getElementById('global-error');
      if (errorDiv) {
        errorDiv.style.display = 'flex';
        document.getElementById('error-msg').innerText = "异步崩溃: " + (event.reason ? (event.reason.stack || event.reason.message || event.reason) : "未知网络错误");
      }
    };
  </script>

  <!-- Firebase 模块初始化 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCFX_coAa6O_INyh_5uwkLtkfep2VehJxc",
      authDomain: "hajimi-assistant.firebaseapp.com",
      projectId: "hajimi-assistant",
      storageBucket: "hajimi-assistant.firebasestorage.app",
      messagingSenderId: "915974880846",
      appId: "1:915974880846:web:cf8b304605b1c892b68d1f",
      measurementId: "G-2H3YST6145"
    };

    window.safeStringify = (obj, indent = 2) => {
        const cache = new Set();
        return JSON.stringify(obj, (key, value) => {
            if (typeof value === 'object' && value !== null) {
                if (cache.has(value)) return '[Circular]';
                cache.add(value);
            }
            return value;
        }, indent);
    };

    try {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        signInAnonymously(auth).catch(() => {});
        window.storage = getStorage(app);

        // 将所有与数据库的交互全部挂载在 window.fbOps 下面供 React 组件使用
        window.fbOps = {
            apiCall: async (method, path, body = null) => {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000); 
                try {
                    const opts = { method, headers: { 'Content-Type': 'application/json' }, signal: controller.signal };
                    if (body) opts.body = JSON.stringify(body);
                    const res = await fetch(path, opts);
                    if (!res.ok) throw new Error(await res.text());
                    return await res.json();
                } finally {
                    clearTimeout(timeoutId);
                }
            },
            
            getScripts: async () => {
                const user = localStorage.getItem('hajimi_username') || 'Unknown';
                return window.fbOps.apiCall('GET', `/api/db/scripts?user=${encodeURIComponent(user)}`);
            },
            saveScript: async (s) => { 
                const user = localStorage.getItem('hajimi_username') || 'Unknown';
                const payload = { category: s.category, keywords: s.keywords, content: s.content, time: new Date().toLocaleString(), id: s.id, user };
                await window.fbOps.apiCall('POST', '/api/db/scripts', payload);
                return await window.fbOps.getScripts();
            },
            deleteScript: async (id) => { await window.fbOps.apiCall('DELETE', `/api/db/scripts/${id}`); return await window.fbOps.getScripts(); },
            
            getKnowledge: async () => window.fbOps.apiCall('GET', '/api/db/knowledge_base'),
            saveKnowledge: async (k) => window.fbOps.apiCall('POST', '/api/db/knowledge_base', k),
            
            getImages: async () => window.fbOps.apiCall('GET', '/api/db/images'),
            uploadImage: async (file, title, tags) => {
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result.split(',')[1]);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
                await window.fbOps.apiCall('POST', '/api/upload-image', {
                    imageData: base64,
                    mimeType: file.type || 'image/jpeg',
                    title,
                    tags,
                    time: new Date().toISOString()
                });
                return await window.fbOps.getImages();
            },
            deleteImage: async (id) => {
                await window.fbOps.apiCall('DELETE', `/api/db/images/${id}`);
                return await window.fbOps.getImages();
            },
            migrateImagesToMongoDB: async () => {
                const res = await fetch('/api/migrate-images', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}'
                });
                if (!res.ok) throw new Error(await res.text());
                return await res.json();
            },

            getTemplates: async () => window.fbOps.apiCall('GET', '/api/db/templates'),
            getCustomVars: async () => { try { const d = await window.fbOps.apiCall('GET', '/api/db/global_settings/template_vars'); return d ? (d.vars || []) : []; } catch(e) { return []; } },
            addCustomVar: async (v) => { try { const d = await window.fbOps.apiCall('GET', '/api/db/global_settings/template_vars'); let vars = d ? (d.vars || []) : []; if(!vars.includes(v)) { vars.push(v); await window.fbOps.apiCall('POST', '/api/db/global_settings', { id: 'template_vars', vars }); } return vars; } catch(e) { return []; } },
            deleteCustomVar: async (v) => { try { const d = await window.fbOps.apiCall('GET', '/api/db/global_settings/template_vars'); let vars = d ? (d.vars || []) : []; if(vars.includes(v)) { vars = vars.filter(item => item !== v); await window.fbOps.apiCall('POST', '/api/db/global_settings', { id: 'template_vars', vars }); } return vars; } catch(e) { return []; } },

            getTrackedTickets: async (username) => window.fbOps.apiCall('GET', `/api/db/monitoring?user=${username}`),
            saveTrackedTicket: async (ticket) => window.fbOps.apiCall('POST', '/api/db/monitoring', { ...ticket, id: ticket.orderId }),
            deleteTrackedTicket: async (orderId) => window.fbOps.apiCall('DELETE', `/api/db/monitoring/${orderId}`),

            getRecentBadAnnouncements: async () => window.fbOps.apiCall('GET', '/api/db/announcement_logs?limit=20'),
            saveTemplate: async (t) => { 
                const content = t.front + t.mail + t.inner; 
                const matches = content.match(/\{{1,2}([\w\u4e00-\u9fa5]+)\}{1,2}/g); 
                const vars = matches ? [...new Set(matches.map(s => s.replace(/[{}]/g, '')))] : []; 
                const data = { id: t.id, type: t.type || "未命名维护", front: t.front || "", inner: t.inner || "", mail: t.mail || "", requiredVars: vars, time: new Date().toISOString() }; 
                await window.fbOps.apiCall('POST', '/api/db/templates', data); 
                return await window.fbOps.getTemplates(); 
            },
            deleteTemplate: async (id) => { await window.fbOps.apiCall('DELETE', `/api/db/templates/${id}`); return await window.fbOps.getTemplates(); },
            
            getAllDataForBackup: async () => { 
                const scripts = await window.fbOps.getScripts(); 
                const templates = await window.fbOps.getTemplates(); 
                const images = await window.fbOps.getImages(); 
                return { exportTime: new Date().toISOString(), scripts, templates, images }; 
            },

            saveFeedback: async (d) => { 
                let safeId = (d.question || "unknown").replace(/[#\/\.\$\[\]\n\r]/g, "_").substring(0, 50); 
                let docId = `${safeId}_${Date.now()}`; 
                const user = localStorage.getItem('hajimi_username') || 'Unknown'; 
                await window.fbOps.apiCall('POST', '/api/db/training_data', { ...d, id: docId, user, time: new Date().toLocaleString() }); 
            },
            saveAnnFeedback: async (d) => { 
                const user = localStorage.getItem('hajimi_username') || 'Unknown'; 
                let dataToSave = { raw: d.raw, type: d.type, reason: d.reason, user, time: new Date().toLocaleString() }; 
                if (d.type === 'bad') { dataToSave.wrong_front = d.front || ""; dataToSave.wrong_inner = d.inner || ""; dataToSave.wrong_mail = d.mail || ""; dataToSave.front = ""; dataToSave.inner = ""; dataToSave.mail = ""; } 
                else { dataToSave.front = d.front || ""; dataToSave.inner = d.inner || ""; dataToSave.mail = d.mail || ""; } 
                let safeId = (d.raw || "unknown").replace(/[#\/\.\$\[\]\n\r]/g, "_").substring(0, 50); 
                let docId = `${safeId}_${Date.now()}`; 
                await window.fbOps.apiCall('POST', '/api/db/announcement_logs', { ...dataToSave, id: docId }); 
            },
            
            getAnnLogsAll: async () => window.fbOps.apiCall('GET', '/api/db/announcement_logs?limit=5000'),
            getTrainingDataAll: async () => window.fbOps.apiCall('GET', '/api/db/training_data?limit=5000'),
            deleteTrainingData: async (id) => { await window.fbOps.apiCall('DELETE', `/api/db/training_data/${id}`); return await window.fbOps.getTrainingDataAll(); },
            deleteAnnLog: async (id) => { await window.fbOps.apiCall('DELETE', `/api/db/announcement_logs/${id}`); return await window.fbOps.getAnnLogsAll(); },
            
            getCloudPrompts: async () => { try { const d = await window.fbOps.apiCall('GET', '/api/db/global_settings/ai_prompts'); return d || {}; } catch(e) { return {}; } },
            saveCloudPrompts: async (data) => window.fbOps.apiCall('POST', '/api/db/global_settings', { id: 'ai_prompts', ...data }),

            // --- 账号管理 API ---
            getAccounts: async () => window.fbOps.apiCall('GET', '/api/db/access_keys'),
            saveAccount: async (acc) => window.fbOps.apiCall('POST', '/api/db/access_keys', acc),
            deleteAccount: async (id) => window.fbOps.apiCall('DELETE', `/api/db/access_keys/${id}`),

            // --- 场馆规则 API ---
            getVenueRules: async () => {
                try { return await window.fbOps.apiCall('GET', '/api/db/venue_rules'); }
                catch(e) { return []; }
            },
            saveVenueRules: async (v) => {
                const payload = {
                    id: v.id,
                    name: v.name || '未命名场馆',
                    rules: v.rules || '',
                    imageCount: v.imageCount || 0,
                    imageHashes: Array.isArray(v.imageHashes) ? v.imageHashes : [],
                    updateTime: new Date().toISOString()
                };
                await window.fbOps.apiCall('POST', '/api/db/venue_rules', payload);
                return await window.fbOps.getVenueRules();
            },
            deleteVenueRules: async (id) => {
                await window.fbOps.apiCall('DELETE', `/api/db/venue_rules/${id}`);
                return await window.fbOps.getVenueRules();
            },
            
            verifyLogin: async (input) => { 
                try { 
                    if (!input) return { success: false }; 
                    const keys = await window.fbOps.apiCall('GET', '/api/db/access_keys?active=true'); 
                    if (!keys || keys.length === 0) return { success: false }; 
                    let result = { success: false }; 
                    keys.forEach(data => { 
                        if (result.success) return; 
                        if (data.username && data.username === input) { result = { success: true, username: data.username, role: data.role || 'user' }; } 
                        else if (data.secret && input.length === 6 && /^\d+$/.test(input)) { 
                            try { 
                                const totp = new window.OTPAuth.TOTP({ algorithm: 'SHA1', digits: 6, period: 30, secret: window.OTPAuth.Secret.fromBase32(data.secret) }); 
                                const delta = totp.validate({ token: input, window: 1 }); 
                                if (delta !== null) { result = { success: true, username: data.username || data.note || "OTP用户", role: data.role || 'admin' }; } 
                            } catch(e) {} 
                        } 
                    }); 
                    return result; 
                } catch(e) { console.error("Auth Error:", e); return { success: false }; } 
            }
        };

        window.firebaseLoaded = true;
        if(window.onFirebaseReady) window.onFirebaseReady();
    } catch(err) { console.error("Init Error", err); }
  </script>

  <!-- 脚本合并运行机制 -->
  <!-- 通过 Fetch 动态加载所有拆分的子文件，并在内存中交由 Babel 一次性编译 -->
  <!-- 这样能够完美实现文件级物理拆分的同时，维持了各组件/函数之间相互调用的同一作用域 -->
  <script>
    async function loadAppScripts() {
      try {
        // 严格的依赖加载顺序
        const files = [
          'js/utils.js',
          'js/config.js',
          'js/api.js',
          'js/dbs-api.js',
          'js/components.js',
          'js/bet-tracker.js',
          'js/app.js'
        ];
        
        let combinedCode = '';
        for (const file of files) {
          const res = await fetch(file + '?v=' + new Date().getTime()); // 添加时间戳避免缓存导致加载旧版
          if (!res.ok) throw new Error(`Failed to load ${file}`);
          const text = await res.text();
          combinedCode += `\n/* --- ${file} --- */\n` + text;
        }
        
        // 关键点：交由 Babel 统一编译，让原本处于单一文件的逻辑合并复原执行
        const compiled = Babel.transform(combinedCode, { presets: ['react'] }).code;
        const script = document.createElement('script');
        script.innerHTML = compiled;
        document.body.appendChild(script);
      } catch (error) {
        console.error('Failed to load application scripts:', error);
        const errorDiv = document.getElementById('global-error');
        const errorMsg = document.getElementById('error-msg');
        if (errorMsg && errorDiv) {
            errorMsg.innerText = "加载应用核心脚本失败: " + error.message;
            errorDiv.style.display = 'flex';
        }
      }
    }
    
    // 等待 DOMContentLoaded 再启动渲染链
    window.addEventListener('DOMContentLoaded', loadAppScripts);
  </script>
</head>
<body>
  <div id="global-error" style="display: none;">
    <div style="font-size: 40px;">😵</div>
    <h2 style="font-size: 20px; font-weight: bold; margin: 10px 0;">程序崩溃了</h2>
    <p id="error-msg" style="color: #ef4444; font-family: monospace; font-size: 12px; background: #fef2f2; padding: 10px; border-radius: 8px;">未知错误</p>
    <button onclick="location.reload()" style="margin-top: 20px; padding: 8px 16px; background: #334155; color: white; border: none; border-radius: 6px; font-weight: bold;">尝试刷新</button>
  </div>
  
  <div id="root">
    <!-- 增加应用启动时的过渡动画，防止白屏 -->
    <div style="height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-family: sans-serif; background: #f8fafc;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
         <div class="spinner" style="width: 26px; height: 26px; border: 3px solid #cbd5e1; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
         <div style="font-weight: bold; font-size: 14px;">加载系统核心模块中...</div>
      </div>
    </div>
  </div>
</body>
</html>
